services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tidocs
      POSTGRES_USER: tidocs
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tidocs123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tidocs"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "ollama serve & sleep 3 && ollama pull phi3.5:mini && wait"
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q phi3.5"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://tidocs:${DB_PASSWORD:-tidocs123}@postgres:5432/tidocs
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: http://localhost:5173
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: phi3.5:mini
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data:
