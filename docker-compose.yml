services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tidocs
      POSTGRES_USER: tidocs
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tidocs123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tidocs"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "ollama serve & sleep 3 && ollama pull phi3.5:mini && wait"

volumes:
  pgdata:
  ollama_data:
